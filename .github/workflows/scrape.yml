name: Scrape
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Instalar navegador
        run: |
          npm i playwright cheerio --no-save
          npx playwright install chromium --with-deps
      - name: Scrapear con navegador real
        run: |
          node << 'EOF'
          const { chromium } = require('playwright');
          const cheerio = require('cheerio');
          (async () => {
            const base = "https://sites.google.com/view/english-chat-student-center/Scheduling?authuser=0";
            const browser = await chromium.launch();
            const context = await browser.newContext({ userAgent: 'Mozilla/5.0' });
            const page = await context.newPage();
            await page.goto(base, { waitUntil: 'domcontentloaded' });
            const html = await page.content();
            const $ = cheerio.load(html);
            let candidatos = [];
            $('a').each((i,el)=>{
              const link=$(el).attr('href');
              const nombre=$(el).text().trim();
              if(link && link.startsWith('https://') && nombre.length>2 && nombre.length<60 && !link.includes('google.com')) {
                if(!candidatos.find(c=>c.link===link)) candidatos.push({nombre, link});
              }
            });
            console.log(`Encontrados ${candidatos.length} links totales`);
            
            let detalle = [];
            let disponibles = [];
            const CONCURRENCY = 5;
            
            for(let i=0; i < candidatos.length; i+=CONCURRENCY){
              const lote = candidatos.slice(i, i+CONCURRENCY);
              console.log(`Revisando lote ${i+1}-${i+lote.length} de ${candidatos.length}`);
              const resultados = await Promise.all(lote.map(async (c) => {
                const p = await context.newPage();
                try {
                  await p.goto(c.link, { waitUntil: 'domcontentloaded', timeout: 15000 });
                  await p.waitForTimeout(3800);
                  const txt = (await p.content()).toLowerCase();
                  const sinHora = txt.includes('No hay disponibilidad') || txt.includes('Cita no encontrada') || txt.includes('No appointment') || txt.includes('no availability') || txt.includes('no times available') || txt.includes('fully booked') || txt.includes('sin horarios');
                  await p.close();
                  if(sinHora) {
                    return { ...c, tiene_cita: false, motivo: 'sin disponibilidad REAL' };
                  } else {
                    return { ...c, tiene_cita: true, motivo: 'TIENE HORARIOS - REVISAR' };
                  }
                } catch(err){
                  await p.close();
                  return { ...c, tiene_cita: false, motivo: 'Error cargando: ' + err.message };
                }
              }));
              
              resultados.forEach(r => {
                detalle.push(r);
                if(r.tiene_cita) disponibles.push({nombre: r.nombre, link: r.link});
              });
            }
            
            await browser.close();
            const out = {personas: disponibles, revisados: candidatos.length, total_disponibles: disponibles.length, detalle, actualizado: new Date().toISOString()};
            require('fs').writeFileSync('personas.json', JSON.stringify(out, null, 2));
            console.log(`FINAL: ${out.revisados} revisados, ${out.total_disponibles} disponibles`);
          })();
          EOF
      - name: Push con force (definitivo)
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          cp personas.json /tmp/personas.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/personas.json personas.json
          git add personas.json
          git diff --staged --quiet && echo "sin cambios" && exit 0
          git commit -m "update personas real 200"
          git push --force
