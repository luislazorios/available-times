name: Scrape

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: |
          npm i playwright cheerio --no-save
          npx playwright install chromium --with-deps
      - name: Scrapear
        run: |
          node << 'EOF'
          const { chromium } = require('playwright');
          const cheerio = require('cheerio');

          function decodeSafeLink(url){
            try {
              if(url.includes('safelinks.protection.outlook.com')){
                const u = new URL(url);
                const real = u.searchParams.get('url');
                if(real) return decodeURIComponent(real);
              }
              return url;
            } catch { return url; }
          }

          (async () => {
            const base = "https://sites.google.com/view/english-chat-student-center/Scheduling?authuser=0";
            const browser = await chromium.launch();
            const context = await browser.newContext({ userAgent: 'Mozilla/5.0' });
            const page = await context.newPage();
            await page.goto(base, { waitUntil: 'networkidle', timeout: 30000 });
            
            // FIX 1: Scroll hasta el final real, no 15 fijos
            let lastCount = 0, stable = 0;
            for(let s=0; s<80; s++){
              await page.mouse.wheel(0, 4000);
              await page.waitForTimeout(1500);
              const count = await page.evaluate(() => document.querySelectorAll('a').length);
              console.log(`Scroll ${s+1}: ${count} links`);
              if(count === lastCount) stable++; else stable = 0;
              lastCount = count;
              if(stable >= 5) break;
            }
            await page.waitForTimeout(3000);

            const html = await page.content();
            const $ = cheerio.load(html);
            let candidatos = [];
            $('a').each((i,el)=>{
              let link=$(el).attr('href');
              const nombre=$(el).text().trim();
              if(!link) return;
              link = decodeSafeLink(link); // FIX 2: Decodifica links de Outlook
              if(link.startsWith('https://') && nombre.length>2 && nombre.length<60 && !link.includes('google.com') && !link.includes('sites.google')) {
                if(!candidatos.find(c=>c.link===link)) candidatos.push({nombre, link});
              }
            });
            console.log(`Encontrados ${candidatos.length}`);
            if(candidatos.length < 10) throw new Error('Muy pocos candidatos, abortando para no borrar');
            let detalle=[], disponibles=[];
            const CONCURRENCY=5;
            for(let i=0;i<candidatos.length;i+=CONCURRENCY){
              console.log(`Lote ${i+1}-${Math.min(i+CONCURRENCY,candidatos.length)} / ${candidatos.length}`);
              const lote=candidatos.slice(i,i+CONCURRENCY);
              const res=await Promise.all(lote.map(async c=>{
                const p=await context.newPage();
                try{
                  await p.goto(c.link,{waitUntil:'domcontentloaded',timeout:20000});
                  await p.waitForTimeout(4000);
                  const body=(await p.innerText('body')).toLowerCase();
                  const sin=body.includes('no times')||body.includes('no availability')||body.includes('unavailable')||body.includes('sin disponibilidad');
                  const btns=await p.locator('button').allInnerTexts();
                  const hasHora=btns.some(t=>/\d{1,2}:\d{2}/.test(t)||/\d{1,2}\s*(am|pm)/i.test(t));
                  await p.close();
                  if(sin) return {...c,tiene_cita:false,motivo:'sin disponibilidad'};
                  if(hasHora) return {...c,tiene_cita:true,motivo:'TIENE HORARIOS'};
                  return {...c,tiene_cita:false,motivo:'sin botones hora'};
                }catch(e){ await p.close(); return {...c,tiene_cita:false,motivo:'Error '+e.message}; }
              }));
              res.forEach(r=>{ detalle.push(r); if(r.tiene_cita) disponibles.push({nombre:r.nombre,link:r.link}); });
            }
            await browser.close();
            const out={personas:disponibles,revisados:candidatos.length,total_disponibles:disponibles.length,detalle,actualizado:new Date().toISOString()};
            require('fs').writeFileSync('personas.json',JSON.stringify(out,null,2));
            console.log(`FINAL ${out.revisados} revisados, ${out.total_disponibles} disponibles`);
          })();
          EOF
      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          
          # Guarda tu archivo nuevo fuera
          mv personas.json /tmp/personas.json.new
          
          # Limpia todo y trae lo último de GitHub sin conflictos
          git stash push --include-untracked -m "tmp" || true
          git fetch origin main
          git reset --hard origin/main
          
          # Vuelve a poner tu archivo nuevo encima
          mv /tmp/personas.json.new personas.json
          
          git add personas.json
          git commit -m "update personas $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "no changes"
          git push
