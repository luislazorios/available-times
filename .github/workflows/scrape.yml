name: Scrape
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Scrapear links reales
        run: |
          npm i node-fetch@2 cheerio --no-save
          node << 'EOF'
          const fetch = require('node-fetch');
          const cheerio = require('cheerio');
          (async () => {
            const base = "https://sites.google.com/view/english-chat-student-center/Scheduling?authuser=0";
            const html = await fetch(base, {headers: {"User-Agent":"Mozilla/5.0"}}).then(r=>r.text());
            const $ = cheerio.load(html);
            let candidatos = [];
            $('a').each((i,el)=>{
              const link=$(el).attr('href');
              const nombre=$(el).text().trim();
              if(link && link.startsWith('https://') && nombre.length>2 && nombre.length<40 && !link.includes('Scheduling') && !link.includes('google.com')) {
                candidatos.push({nombre, link});
              }
            });
            candidatos = [...new Map(candidatos.map(c=>[c.link,c])).values()].slice(0,30);
            console.log('Encontrados:', candidatos.length);
            let detalle=[]; let disponibles=[];
            for(let c of candidatos){
              try{
                const txt = await fetch(c.link, {headers: {"User-Agent":"Mozilla/5.0"}}).then(r=>r.text()).then(t=>t.toLowerCase());
                const no = txt.includes('sin disponibilidad') || txt.includes('no hay citas') || txt.includes('cita no encontrada') || txt.includes('no availability') || txt.includes('fully booked');
                if(!no){ disponibles.push(c); detalle.push({...c, tiene_cita:true, motivo:'POSIBLE DISPONIBLE - NO dice sin disponibilidad'}); }
                else { detalle.push({...c, tiene_cita:false, motivo:'sin disponibilidad'}); }
              }catch(e){ detalle.push({...c, tiene_cita:false, motivo:'error: '+e.message}); }
            }
            const out = {personas:disponibles, revisados:candidatos.length, total_disponibles:disponibles.length, detalle, actualizado:new Date().toISOString()};
            require('fs').writeFileSync('personas.json', JSON.stringify(out, null, 2));
            console.log('Guardado', out.revisados, 'revisados', out.total_disponibles, 'disponibles');
          })();
          EOF
      - name: Push json
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add personas.json
          git diff --staged --quiet || git commit -m "update personas"
          git push
