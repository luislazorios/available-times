<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personas Disponibles</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:#fafafa;min-height:100vh;display:flex;justify-content:center;padding:32px 16px}
.wrap{width:100%;max-width:620px}
h1{font-size:26px;font-weight:800;text-align:center}
.sub{text-align:center;color:#888;font-size:13px;margin:6px 0 22px}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;overflow:hidden}
.bar{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:#f9f9f9;border-bottom:1px solid #eee}
#contador{font-size:12px;color:#888}
.btn{border:0;background:#111;color:#fff;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
#estado{padding:14px;text-align:center;color:#999;font-size:13px}
ul{list-style:none}
li{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid #f2f2f2}
li:last-child{border:0}
.dot{width:8px;height:8px;background:#22c55e;border-radius:50%}
.left{display:flex;align-items:center;gap:8px}
.num{color:#bbb;font-size:12px;width:16px}
.name{font-size:14px}
a.res{font-size:11px;border:1px solid #ddd;border-radius:20px;padding:4px 10px;text-decoration:none;color:#111}
.don{margin-top:18px;background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:20px;text-align:center}
#btnDonar{width:100%;margin-top:12px;background:#111;color:#fff;border:0;border-radius:10px;padding:12px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
<h1>Personas Disponibles</h1>
<p class="sub">Filtrando solo con disponibilidad</p>
<div class="card">
<div class="bar"><span id="contador">0 personas</span><button id="btnActualizar" class="btn">Actualizar</button></div>
<div id="estado">Cargando...</div>
<ul id="lista"></ul>
</div>
<div class="don">
<b>¿Te sirve?</b><p style="font-size:12px;color:#888;margin-top:4px">Apoya con $800 CLP</p>
<button id="btnDonar">Donar $800 CLP</button>
<p id="estadoDonacion" style="font-size:11px;color:#999;margin-top:8px"></p>
</div>
</div>
<script>
const LAMBDA_LIST_URL = "https://kwox665vfege2ags732h3uqq5e0tldnv.lambda-url.sa-east-1.on.aws/";
const LAMBDA_DONACION_URL = "https://fgzutinyqjkep42ami5b554inm0zxhwn.lambda-url.sa-east-1.on.aws/";

const listaEl=document.getElementById('lista'),estadoEl=document.getElementById('estado'),contadorEl=document.getElementById('contador');
async function cargarPersonas(){
 estadoEl.style.display='block';estadoEl.textContent='Buscando...';listaEl.innerHTML='';
 try{
  const r=await fetch(LAMBDA_LIST_URL);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d=await r.json();
  render(d.personas||[]);
 }catch(e){
  console.error(e);
  estadoEl.textContent='Error: '+e.message+' - Revisa Function URL en NONE';
  contadorEl.textContent='Error';
 }
}
function render(arr){
 listaEl.innerHTML='';
 if(!arr.length){estadoEl.textContent='No hay disponibilidad';contadorEl.textContent='0 personas';return;}
 estadoEl.style.display='none';contadorEl.textContent=arr.length+' personas';
 arr.forEach((p,i)=>{
  const nombre=typeof p==='string'?p:p.nombre;
  const link=p.link||'#';
  const li=document.createElement('li');
  li.innerHTML=`<div class="left"><div class="dot"></div><span class="num">${i+1}.</span><span class="name">${nombre}</span></div><a class="res" href="${link}" target="_blank">Reservar</a>`;
  listaEl.appendChild(li);
 });
}
async function donar(){
 const el=document.getElementById('estadoDonacion');
 el.textContent='Conectando...';
 try{
  const res=await fetch(LAMBDA_DONACION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
  const txt=await res.text();
  console.log('MP RAW:',txt);
  if(!txt.trim().startsWith('{')) throw new Error('Lambda devolvió: '+txt.slice(0,150));
  const data=JSON.parse(txt);
  const url=data.url_pago||data.init_point||data.sandbox_init_point;
  if(url) window.location.href=url;
  else throw new Error('Sin url: '+txt);
 }catch(e){
  console.error(e);
  el.textContent='Error: '+e.message;
 }
}
document.getElementById('btnActualizar').onclick=cargarPersonas;
document.getElementById('btnDonar').onclick=donar;
cargarPersonas();
</script>
</body>
</html>
